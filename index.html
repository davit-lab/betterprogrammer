            background: var(--accent-primary);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }

        ::-webkit-scrollbar-track { background: #03070b; }
